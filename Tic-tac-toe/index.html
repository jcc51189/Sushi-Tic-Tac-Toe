<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sushi Tac Toe • Nigiri vs Shōyu</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Sushi Tac Toe">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Roboto:wght@400;500&amp;display=swap');

        * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #3C2F2F 0%, #2C221F 100%);
            color: #F5E8C7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 6px 4px;
            position: relative;
            overflow-x: hidden;
        }

        header { width:100%; max-width:580px; text-align:center; margin-bottom:6px; }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.85rem, 5.8vw, 2.85rem);
            color: #F4C430;
            text-shadow: 0 3px 0 #E6392B, 3px 3px 8px rgba(0,0,0,0.5);
        }
        .subtitle { font-size:0.9rem; color:#8BC34A; letter-spacing:2.5px; text-transform:uppercase; }

        .main-container { display:flex; flex-direction:column; gap:8px; width:100%; max-width:620px; flex:1; }

        .sidebar {
            background:rgba(60,47,47,0.95); border:7px solid #F4C430; border-radius:18px;
            padding:12px; width:100%; box-shadow:0 8px 25px rgba(0,0,0,0.5);
        }

        .scoreboard { display:flex; justify-content:space-between; align-items:center; }

        .player-score { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }

        .player-icon {
            width:52px; height:52px; background:#F5E8C7; border-radius:50%;
            display:flex; align-items:center; justify-content:center; font-size:28px;
            box-shadow:0 5px 10px rgba(0,0,0,0.4);
        }

        .player-score.active .player-icon { transform:scale(1.12); box-shadow:0 0 0 5px #E6392B; }

        .score-number { font-size:1.9rem; font-weight:700; color:#F4C430; }

        .board-container {
            position:relative; width:100%; max-width:280px; aspect-ratio:1/1;
            background:#F5E8C7; border-radius:20px; padding:7px;
            box-shadow:0 15px 30px rgba(0,0,0,0.6); border:8px solid #3C2F2F;
            margin:0 auto;
        }

        .board {
            display:grid; grid-template-columns:repeat(3,minmax(0,1fr));
            grid-template-rows:repeat(3,minmax(0,1fr)); gap:7px;
            width:100%; height:100%; background:#3C2F2F; border-radius:11px;
            padding:5px; min-height:0; min-width:0; align-items:stretch; justify-items:stretch;
        }

        .cell {
            background:#F5E8C7; border-radius:10px; display:flex;
            align-items:center; justify-content:center; cursor:pointer;
            transition:all 0.2s ease; overflow:hidden; min-height:0; min-width:0;
        }

        .cell:hover, .cell:active { background:#f8f0d8; transform:scale(1.04); }
        .cell.filled { cursor:not-allowed; }

        .symbol-wrapper { width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .symbol { width:72%; height:72%; display:flex; align-items:center; justify-content:center; animation:pop-in 0.4s ease; }

        @keyframes pop-in {
            from { transform:scale(0.1) rotate(-30deg); opacity:0; }
            to { transform:scale(1) rotate(0); opacity:1; }
        }

        .win-line { position:absolute; inset:0; pointer-events:none; z-index:10; display:none; }

        .status {
            font-size:1.12rem; font-weight:500; min-height:40px;
            display:flex; align-items:center; justify-content:center;
            background:rgba(60,47,47,0.8); border-radius:9999px;
            padding:8px 18px; width:100%; max-width:280px; margin:0 auto 6px;
        }

        .controls {
            display:flex; flex-direction:column; align-items:center; gap:8px;
            width:100%; max-width:280px; margin:0 auto;
        }

        .mode-select { display:flex; background:rgba(60,47,47,0.9); padding:4px; border-radius:50px; }

        .mode-btn {
            padding:8px 13px; border-radius:50px; font-size:0.87rem;
            background:transparent; color:#F5E8C7; cursor:pointer;
        }

        .mode-btn.active { background:#F4C430; color:#3C2F2F; }

        button.btn-primary {
            background:#E6392B; color:white; padding:12px 36px;
            font-size:1.05rem; width:100%; border:none; border-radius:50px;
        }

        #install-prompt {
            position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
            background:#F4C430; color:#3C2F2F; padding:14px 20px; border-radius:16px;
            box-shadow:0 10px 25px rgba(0,0,0,0.4); max-width:280px; width:90%;
            text-align:center; display:none; z-index:1000; font-weight:500;
        }
    </style>
</head>
<body>
    <header>
        <div class="title">SUSHI TAC TOE</div>
        <div class="subtitle">🍣 Salmon Nigiri vs 🥢 Soy Sauce</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="scoreboard">
                <div class="player-score" id="player1-score">
                    <div class="player-icon">🍣</div>
                    <div class="player-name">NIGIRI</div>
                    <div class="score-number" id="score-nigiri">0</div>
                </div>
                <div style="font-size:1.9rem;color:#F4C430;">VS</div>
                <div class="player-score" id="player2-score">
                    <div class="player-icon">
                        <svg width="50" height="64" viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="26" y="24" width="48" height="82" rx="10" fill="#2C2C2C" stroke="#3C2F2F" stroke-width="10"/>
                            <rect x="32" y="34" width="36" height="67" rx="5" fill="#3E2723"/>
                            <rect x="20" y="14" width="60" height="24" rx="8" fill="#E6392B"/>
                        </svg>
                    </div>
                    <div class="player-name">SOY SAUCE</div>
                    <div class="score-number" id="score-soy">0</div>
                </div>
            </div>
            <div style="text-align:center; margin-top:10px; font-size:1.02rem;">
                TIES <span id="score-ties" style="font-weight:700;color:#8BC34A;">0</span>
            </div>
            <button onclick="resetScores()" id="reset-btn" style="margin-top:10px;width:100%;background:#F4C430;color:#3C2F2F;">RESET SCORES</button>
        </div>

        <div style="width:100%; max-width:280px; margin:0 auto;">
            <div class="status" id="status">
                <span id="status-text">Tap NEW GAME to start</span>
            </div>

            <div class="board-container">
                <div class="board" id="board"></div>
                <div class="win-line" id="win-line">
                    <svg id="win-svg" width="100%" height="100%" viewBox="0 0 300 300"></svg>
                </div>
            </div>

            <div class="controls">
                <div class="mode-select">
                    <button onclick="setMode(0)" class="mode-btn active" id="mode-0">2 Players</button>
                    <button onclick="setMode(1)" class="mode-btn" id="mode-1">Easy</button>
                    <button onclick="setMode(2)" class="mode-btn" id="mode-2">Medium</button>
                    <button onclick="setMode(3)" class="mode-btn" id="mode-3">Hard</button>
                </div>
                <button onclick="newGame()" class="btn-primary">NEW GAME</button>
            </div>
        </div>
    </div>

    <!-- Install Prompt -->
    <div id="install-prompt">
        <strong>📱 Add to Home Screen</strong><br>
        Tap the Share button <span style="font-size:1.4rem">↗︎</span> at the bottom, then tap "Add to Home Screen"<br>
        <button onclick="hideInstallPrompt()" style="margin-top:10px;background:#3C2F2F;color:#F4C430;border:none;padding:8px 20px;border-radius:50px;font-size:0.9rem;">Got it</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div id="modal-icon" style="font-size:5.2rem;margin-bottom:14px;"></div>
            <h2 id="modal-title"></h2>
            <p id="modal-subtitle" style="font-size:1.2rem;margin:14px 0 24px;"></p>
            <button onclick="hideModal();newGame()" class="btn-primary" style="width:100%;padding:12px;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const NIGIRI = 'nigiri';
        const SOY = 'soy';

        let board = Array(9).fill(null);
        let currentPlayer = NIGIRI;
        let gameActive = true;
        let mode = 0;
        let scores = { nigiri: 0, soy: 0, ties: 0 };
        let starter = NIGIRI;

        let cells = [];
        const boardEl = document.getElementById('board');
        const statusText = document.getElementById('status-text');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalSubtitle = document.getElementById('modal-subtitle');
        const modalIcon = document.getElementById('modal-icon');
        const winLineEl = document.getElementById('win-line');
        const winSVG = document.getElementById('win-svg');
        const installPrompt = document.getElementById('install-prompt');

        function createBoard() {
            boardEl.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchend', (e) => { e.preventDefault(); handleCellClick(e); }, { passive: false });
                boardEl.appendChild(cell);
                cells.push(cell);
            }
        }

        function renderSymbol(cell, player) {
            cell.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'symbol-wrapper';
            const symbol = document.createElement('div');
            symbol.className = 'symbol';

            if (player === NIGIRI) {
                symbol.innerHTML = `<svg width="100%" height="100%" viewBox="0 0 120 110" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="60" cy="82" rx="46" ry="17" fill="#FAF3E0" stroke="#3C2F2F" stroke-width="7"/>
                    <path d="M24 52 Q40 37 60 39 Q80 37 96 52 L96 70 Q60 77 24 70 Z" fill="#FF7F50"/>
                </svg>`;
            } else {
                symbol.innerHTML = `<svg width="100%" height="100%" viewBox="0 0 100 135" preserveAspectRatio="xMidYMid meet" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="26" y="24" width="48" height="84" rx="10" fill="#2C2C2C" stroke="#3C2F2F" stroke-width="10"/>
                    <rect x="32" y="34" width="36" height="67" rx="5" fill="#3E2723"/>
                    <rect x="20" y="14" width="60" height="24" rx="8" fill="#E6392B"/>
                </svg>`;
            }
            wrapper.appendChild(symbol);
            cell.appendChild(wrapper);
            cell.classList.add('filled');
        }

        function handleCellClick(e) {
            if (!gameActive) return;
            const index = parseInt(e.currentTarget.dataset.index);
            if (board[index] !== null) return;

            makeMove(index, currentPlayer);

            if (gameActive && mode > 0 && currentPlayer === SOY) {
                setTimeout(aiMove, 400);
            }
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let combo of wins) {
                const [a,b,c] = combo;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a], line: combo };
                }
            }
            return null;
        }

        function drawWinLine(line) {
            winLineEl.style.display = 'block';
            winSVG.innerHTML = '';
            const pos = [[50,50],[150,50],[250,50],[50,150],[150,150],[250,150],[50,250],[150,250],[250,250]];
            const s = pos[line[0]], e = pos[line[2]];
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", s[0]); l.setAttribute("y1", s[1]);
            l.setAttribute("x2", e[0]); l.setAttribute("y2", e[1]);
            l.setAttribute("stroke", "#E6392B");
            l.setAttribute("stroke-width", "16");
            l.setAttribute("stroke-linecap", "round");
            winSVG.appendChild(l);
        }

        function makeMove(index, player) {
            board[index] = player;
            renderSymbol(cells[index], player);

            const result = checkWin();
            if (result) {
                gameActive = false;
                drawWinLine(result.line);
                if (result.winner === NIGIRI) {
                    scores.nigiri++;
                    document.getElementById('score-nigiri').textContent = scores.nigiri;
                    showModal('🍣', 'NIGIRI WINS!', 'Salmon supremacy!');
                } else {
                    scores.soy++;
                    document.getElementById('score-soy').textContent = scores.soy;
                    showModal('🥢', 'SOY SAUCE WINS!', 'Perfect pour!');
                }
                return;
            }

            if (!board.includes(null)) {
                gameActive = false;
                scores.ties++;
                document.getElementById('score-ties').textContent = scores.ties;
                showModal('🤝', 'IT’S A TIE!', 'Great game!');
                return;
            }

            currentPlayer = currentPlayer === NIGIRI ? SOY : NIGIRI;
            updateStatus();
        }

        function updateStatus() {
            document.getElementById('player1-score').classList.toggle('active', currentPlayer === NIGIRI);
            document.getElementById('player2-score').classList.toggle('active', currentPlayer === SOY);
            statusText.textContent = currentPlayer === NIGIRI ? "🍣 Nigiri’s turn" : "🥢 Soy sauce’s turn";
        }

        function showModal(icon, title, subtitle) {
            modalIcon.textContent = icon;
            modalTitle.textContent = title;
            modalSubtitle.textContent = subtitle;
            modal.style.display = 'flex';
        }

        function hideModal() {
            modal.style.display = 'none';
        }

        function minimax(newBoard, depth, isMaximizing, depthLimit) {
            const result = checkWin();
            if (result) return result.winner === SOY ? 10 - depth : -10 + depth;
            if (!newBoard.includes(null) || depth >= depthLimit) return 0;

            if (isMaximizing) {
                let best = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === null) {
                        newBoard[i] = SOY;
                        best = Math.max(best, minimax(newBoard, depth+1, false, depthLimit));
                        newBoard[i] = null;
                    }
                }
                return best;
            } else {
                let best = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (newBoard[i] === null) {
                        newBoard[i] = NIGIRI;
                        best = Math.min(best, minimax(newBoard, depth+1, true, depthLimit));
                        newBoard[i] = null;
                    }
                }
                return best;
            }
        }

        function getBestMove(depthLimit) {
            let bestScore = -Infinity;
            let bestMove = null;
            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    board[i] = SOY;
                    const score = minimax(board, 0, false, depthLimit);
                    board[i] = null;
                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = i;
                    }
                }
            }
            return bestMove;
        }

        function aiMove() {
            if (!gameActive) return;
            let depthLimit = mode === 1 ? 2 : mode === 2 ? 4 : 7;
            if (mode === 1 && Math.random() < 0.4) {
                const empty = board.map((v,i) => v===null ? i : null).filter(v=>v!==null);
                makeMove(empty[Math.floor(Math.random()*empty.length)], SOY);
                return;
            }
            const move = getBestMove(depthLimit);
            if (move !== null) makeMove(move, SOY);
        }

        function newGame() {
            board = Array(9).fill(null);
            gameActive = true;
            winLineEl.style.display = 'none';
            currentPlayer = starter;
            starter = starter === NIGIRI ? SOY : NIGIRI;
            createBoard();
            updateStatus();
            if (mode > 0 && currentPlayer === SOY) setTimeout(aiMove, 500);
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', i===m));
        }

        function resetScores() {
            scores = { nigiri: 0, soy: 0, ties: 0 };
            document.getElementById('score-nigiri').textContent = '0';
            document.getElementById('score-soy').textContent = '0';
            document.getElementById('score-ties').textContent = '0';
            statusText.textContent = "Scores reset!";
            setTimeout(() => { if (gameActive) updateStatus(); }, 1400);
        }

        function showInstallPrompt() {
            if ('standalone' in window.navigator && window.navigator.standalone) return;
            setTimeout(() => {
                installPrompt.style.display = 'block';
            }, 1800);
        }

        function hideInstallPrompt() {
            installPrompt.style.display = 'none';
        }

        // Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        window.onload = () => {
            createBoard();
            updateStatus();
            document.getElementById('reset-btn').addEventListener('click', resetScores);
            showInstallPrompt();
            console.log("%c🍣 Sushi Tac Toe PWA Ready - Offline + Installable", "color:#F4C430;font-weight:bold");
        };
    </script>
</body>
</html>
